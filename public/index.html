<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>WhatsApp Warmer • Spark</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .card-hover { transition: all 0.15s ease; }
        .card-hover:active { transform: scale(0.98); }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 8px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        
        .log-container::-webkit-scrollbar { width: 6px; }
        .log-container::-webkit-scrollbar-track { background: #1e293b; border-radius: 8px; }
        .log-container::-webkit-scrollbar-thumb { background: #475569; border-radius: 8px; }
        
        .btn-gradient { background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%); transition: opacity 0.2s; }
        .btn-gradient:active { opacity: 0.8; }
        .status-badge { font-size: 0.6rem; padding: 0.1rem 0.4rem; border-radius: 9999px; }
        .tab-active { background-color: #EEF2FF; color: #4338CA; }
        .tab-inactive { color: #6B7280; }
        
        /* Atur tinggi container daftar akun agar muat 10 akun (5 baris) tanpa scroll */
        .account-container {
            max-height: 360px;
            overflow-y: auto;
        }
        @media (min-width: 768px) {
            .account-container {
                max-height: 380px;
            }
        }
    </style>
</head>
<body class="bg-gray-50 h-screen overflow-hidden">

<div class="flex h-full">
    <!-- Sidebar -->
    <aside class="hidden md:flex md:flex-col w-64 bg-white border-r border-gray-200 flex-shrink-0">
        <div class="p-5">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center">
                    <i class="fab fa-whatsapp text-white text-lg"></i>
                </div>
                <span class="text-xl font-semibold text-gray-800">Warmer<span class="text-indigo-600">Spark</span></span>
            </div>
        </div>
        <nav class="mt-4 px-3 flex-1">
            <a href="#" class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg bg-indigo-50 text-indigo-700">
                <i class="fas fa-tachometer-alt w-5 h-5 mr-3"></i> Dashboard
            </a>
        </nav>
        <div class="p-4 border-t border-gray-200">
            <div class="flex items-center">
                <div class="w-8 h-8 bg-gray-300 rounded-full flex items-center justify-center"><i class="fas fa-user text-gray-600 text-sm"></i></div>
                <div class="ml-3"><p class="text-sm font-medium text-gray-700">Admin</p><p class="text-xs text-gray-500">admin@local</p></div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden p-3 md:p-4 lg:p-5">
        <!-- Header dipadatkan -->
        <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 mb-2 flex-shrink-0">
            <div>
                <h1 class="text-base md:text-lg font-bold text-gray-800">Dashboard Pemanasan</h1>
                <p class="text-gray-500 text-xs mt-0.5">Pantau aktivitas akun WhatsApp Anda</p>
            </div>
            <button id="manualWarmupBtn" class="btn-gradient text-white px-3 py-1.5 rounded-lg text-xs font-medium shadow-sm flex items-center justify-center space-x-2 w-full sm:w-auto">
                <i class="fas fa-play-circle text-xs"></i><span>Mulai Pemanasan</span>
            </button>
        </div>

        <!-- Tabs Navigation -->
        <div class="border-b border-gray-200 mb-2 flex-shrink-0">
            <nav class="flex space-x-4">
                <button id="tab-status-btn" class="tab-btn px-3 py-1.5 text-xs font-medium rounded-t-lg tab-active" data-tab="status">
                    <i class="fas fa-phone-alt mr-1"></i>Status Akun
                </button>
                <button id="tab-stats-btn" class="tab-btn px-3 py-1.5 text-xs font-medium rounded-t-lg tab-inactive" data-tab="stats">
                    <i class="fas fa-chart-bar mr-1"></i>Statistik Mingguan
                </button>
            </nav>
        </div>

        <!-- Tab Content: Status Akun -->
        <div id="tab-status-content" class="flex-1 flex flex-col min-h-0">
            <!-- Statistik Cards dipadatkan -->
            <div class="grid grid-cols-3 gap-2 mb-2 flex-shrink-0">
                <div class="bg-white rounded-lg shadow-sm border border-gray-100 p-1.5 md:p-2 flex items-center justify-between">
                    <div>
                        <p class="text-[10px] font-medium text-gray-500">Total Akun</p>
                        <p class="text-base md:text-lg font-bold text-gray-800" id="totalAccounts">0</p>
                    </div>
                    <div class="w-6 h-6 md:w-7 md:h-7 bg-indigo-100 rounded-lg flex items-center justify-center">
                        <i class="fas fa-users text-indigo-600 text-xs"></i>
                    </div>
                </div>
                <div class="bg-white rounded-lg shadow-sm border border-gray-100 p-1.5 md:p-2 flex items-center justify-between">
                    <div>
                        <p class="text-[10px] font-medium text-gray-500">Online</p>
                        <p class="text-base md:text-lg font-bold text-gray-800" id="onlineAccounts">0</p>
                    </div>
                    <div class="w-6 h-6 md:w-7 md:h-7 bg-green-100 rounded-lg flex items-center justify-center">
                        <i class="fas fa-circle text-green-500 text-xs"></i>
                    </div>
                </div>
                <div class="bg-white rounded-lg shadow-sm border border-gray-100 p-1.5 md:p-2 flex items-center justify-between">
                    <div>
                        <p class="text-[10px] font-medium text-gray-500">Pesan Hari Ini</p>
                        <p class="text-base md:text-lg font-bold text-gray-800" id="totalMessages">0</p>
                    </div>
                    <div class="w-6 h-6 md:w-7 md:h-7 bg-purple-100 rounded-lg flex items-center justify-center">
                        <i class="fas fa-comment-dots text-purple-600 text-xs"></i>
                    </div>
                </div>
            </div>

            <!-- Layout dua kolom: kiri (daftar akun) lebih sempit, kanan (log) lebih lebar -->
            <div class="flex-1 flex flex-col md:flex-row gap-3 min-h-0">
                <!-- Kolom Kiri: Daftar Akun dengan tinggi pas untuk 10 akun (5 baris) -->
                <div class="w-full md:w-1/3 flex flex-col min-h-0">
                    <div class="flex items-center justify-between mb-1 flex-shrink-0">
                        <h2 class="text-xs font-semibold text-gray-700 flex items-center">
                            <i class="fas fa-phone-alt mr-1 text-indigo-500 text-[10px]"></i>Status Akun
                            <span class="ml-1 text-[10px] font-normal text-gray-400" id="accountCount">0/0</span>
                        </h2>
                    </div>
                    <div class="custom-scroll overflow-y-auto border border-gray-100 rounded-lg bg-white p-1.5 account-container">
                        <div class="grid grid-cols-2 gap-1.5" id="accountCards">
                            <div class="bg-white rounded-lg shadow-sm border border-gray-100 p-1.5 animate-pulse">
                                <div class="h-2 bg-gray-200 rounded w-1/2 mb-1"></div>
                                <div class="h-1.5 bg-gray-200 rounded w-3/4"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Kolom Kanan: Log Aktivitas dengan teks yang lebih besar -->
                <div class="w-full md:w-2/3 flex flex-col min-h-0">
                    <h2 class="text-xs font-semibold text-gray-700 mb-1 flex items-center flex-shrink-0">
                        <i class="fas fa-stream mr-1 text-indigo-500 text-[10px]"></i>Log Aktivitas 
                        <span class="ml-1 text-[10px] font-normal bg-gray-200 text-gray-600 px-1.5 py-0.5 rounded-full">Live</span>
                    </h2>
                    <div class="bg-gray-900 rounded-xl shadow-lg border border-gray-800 p-3 flex-1 overflow-y-auto font-mono text-xs log-container" id="logContainer">
                        <div class="text-gray-400">[Sistem] Menunggu aktivitas...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab Content: Statistik Mingguan -->
        <div id="tab-stats-content" class="hidden flex-1 overflow-auto">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-3">
                <h3 class="text-sm font-semibold mb-2">Aktivitas 7 Hari Terakhir</h3>
                <div class="overflow-x-auto -mx-3 px-3">
                    <table class="min-w-full text-xs">
                        <thead>
                            <tr class="border-b">
                                <th class="text-left py-1.5">Tanggal</th>
                                <th class="text-left py-1.5" colspan="10">Pesan per Akun</th>
                                <th class="text-right py-1.5">Total</th>
                            </tr>
                        </thead>
                        <tbody id="statsTableBody">
                            <tr><td colspan="12" class="text-center py-3 text-gray-500">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const accountCardsDiv = document.getElementById('accountCards');
    const logContainer = document.getElementById('logContainer');
    const totalAccountsSpan = document.getElementById('totalAccounts');
    const onlineAccountsSpan = document.getElementById('onlineAccounts');
    const totalMessagesSpan = document.getElementById('totalMessages');
    const accountCountSpan = document.getElementById('accountCount');

    const tabStatusBtn = document.getElementById('tab-status-btn');
    const tabStatsBtn = document.getElementById('tab-stats-btn');
    const tabStatusContent = document.getElementById('tab-status-content');
    const tabStatsContent = document.getElementById('tab-stats-content');

    function addLog(account, message) {
        const time = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const logEntry = document.createElement('div');
        logEntry.className = 'py-1 border-b border-gray-800 last:border-0';
        logEntry.innerHTML = `<span class="text-indigo-400">[${time}]</span> <span class="text-emerald-400 font-medium">[${account}]</span> <span class="text-gray-300">${message}</span>`;
        logContainer.appendChild(logEntry);
        logContainer.scrollTop = logContainer.scrollHeight;
        if (logContainer.children.length > 80) logContainer.removeChild(logContainer.children[0]);
    }

    function renderStatusCards(statusData) {
        let html = '';
        let onlineCount = 0;
        let totalMsg = 0;
        const total = Object.keys(statusData).length;
        
        for (const [id, data] of Object.entries(statusData)) {
            const isOnline = data.ready;
            if (isOnline) onlineCount++;
            totalMsg += data.messagesToday || 0;
            
            html += `
                <div class="bg-white rounded-lg shadow-sm border ${isOnline ? 'border-green-200' : 'border-gray-200'} p-1.5 card-hover">
                    <div class="flex items-start justify-between">
                        <div class="min-w-0 flex-1">
                            <div class="flex items-center space-x-1">
                                <span class="font-medium text-gray-800 text-[11px] truncate" title="${id}">${id}</span>
                                ${isOnline 
                                    ? '<span class="status-badge bg-green-100 text-green-800">Online</span>'
                                    : '<span class="status-badge bg-gray-100 text-gray-600">Offline</span>'
                                }
                            </div>
                            <div class="mt-0.5 space-y-0.5">
                                <p class="text-[9px] text-gray-500 flex items-center">
                                    <i class="far fa-clock w-3 mr-0.5 text-gray-400"></i>
                                    <span class="truncate">${data.lastActivity || '-'}</span>
                                </p>
                                <p class="text-[9px] text-gray-500 flex items-center">
                                    <i class="far fa-comment-dots w-3 mr-0.5 text-gray-400"></i>
                                    ${data.messagesToday} pesan
                                </p>
                                ${data.jid ? `<p class="text-[9px] text-gray-400 truncate" title="${data.jid}">${data.jid.split('@')[0]}</p>` : ''}
                            </div>
                        </div>
                        <div class="w-5 h-5 ${isOnline ? 'bg-green-50' : 'bg-gray-100'} rounded-md flex items-center justify-center ml-1 flex-shrink-0">
                            <i class="fab fa-whatsapp ${isOnline ? 'text-green-600' : 'text-gray-400'} text-[10px]"></i>
                        </div>
                    </div>
                </div>
            `;
        }
        
        accountCardsDiv.innerHTML = html || '<div class="col-span-2 text-center py-3 text-gray-500 text-[10px]">Tidak ada akun terdaftar.</div>';
        totalAccountsSpan.textContent = total;
        onlineAccountsSpan.textContent = onlineCount;
        totalMessagesSpan.textContent = totalMsg;
        accountCountSpan.textContent = `${onlineCount}/${total}`;
    }

    function setActiveTab(tabId) {
        [tabStatusBtn, tabStatsBtn].forEach(btn => {
            btn.classList.remove('tab-active', 'bg-indigo-50', 'text-indigo-700');
            btn.classList.add('tab-inactive', 'text-gray-500');
        });
        tabStatusContent.classList.add('hidden');
        tabStatsContent.classList.add('hidden');

        if (tabId === 'status') {
            tabStatusBtn.classList.remove('tab-inactive', 'text-gray-500');
            tabStatusBtn.classList.add('tab-active', 'bg-indigo-50', 'text-indigo-700');
            tabStatusContent.classList.remove('hidden');
        } else {
            tabStatsBtn.classList.remove('tab-inactive', 'text-gray-500');
            tabStatsBtn.classList.add('tab-active', 'bg-indigo-50', 'text-indigo-700');
            tabStatsContent.classList.remove('hidden');
            loadStats();
        }
    }

    tabStatusBtn.addEventListener('click', () => setActiveTab('status'));
    tabStatsBtn.addEventListener('click', () => setActiveTab('stats'));

    async function loadStats() {
        try {
            const res = await fetch('/api/stats/weekly');
            const data = await res.json();
            const tbody = document.getElementById('statsTableBody');
            const dates = Object.keys(data).sort().reverse();
            if (dates.length === 0) {
                tbody.innerHTML = '<tr><td colspan="12" class="text-center py-3 text-gray-500">Belum ada data</td></tr>';
                return;
            }
            
            const allAccounts = new Set();
            dates.forEach(date => {
                Object.keys(data[date]).forEach(acc => allAccounts.add(acc));
            });
            const accounts = Array.from(allAccounts);
            
            let html = '';
            for (const date of dates) {
                const accData = data[date];
                let total = 0;
                let row = `<tr class="border-b"><td class="py-1.5 font-medium text-xs">${date}</td>`;
                for (const acc of accounts) {
                    const count = accData[acc] || 0;
                    total += count;
                    row += `<td class="py-1.5 px-1 text-center text-xs">${count}</td>`;
                }
                row += `<td class="text-right py-1.5 font-semibold text-xs">${total}</td></tr>`;
                html += row;
            }
            
            const headerRow = tbody.previousElementSibling?.querySelector('tr');
            if (headerRow) {
                const totalTh = headerRow.querySelector('th:last-child');
                while (headerRow.children.length > 2) {
                    headerRow.removeChild(headerRow.children[1]);
                }
                accounts.forEach(acc => {
                    const th = document.createElement('th');
                    th.className = 'text-left py-1.5 text-xs';
                    th.textContent = acc;
                    headerRow.insertBefore(th, totalTh);
                });
            }
            
            tbody.innerHTML = html;
        } catch (e) {
            console.error(e);
        }
    }

    socket.on('status-update', (data) => renderStatusCards(data));
    socket.on('log', (data) => addLog(data.account, data.message));
    
    document.getElementById('manualWarmupBtn').addEventListener('click', async () => {
        try {
            await fetch('/api/warmup', { method: 'POST' });
            addLog('SYSTEM', '✅ Siklus pemanasan manual dimulai.');
        } catch (e) {
            addLog('ERROR', 'Gagal memulai pemanasan manual.');
        }
    });
    
    fetch('/api/status')
        .then(res => res.json())
        .then(data => renderStatusCards(data))
        .catch(console.error);
        
    addLog('SYSTEM', 'Dashboard terhubung. Menunggu aktivitas...');
</script>
</body>
</html>
